controller_manager:
  ros__parameters:
    update_rate: 100 # Hz (A safe middle ground between 10 and 1000)

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - Revolute_20
      - Revolute_26
      - Revolute_30
      - Revolute_37
      - Revolute_45
    
    # Restored to purely position-based logic
    command_interfaces:
      - position
    state_interfaces:
      - position

    # Restored your old working trajectory settings
    open_loop_control: true
    allow_integration_in_goal_trajectories: true

gripper_controller:
  ros__parameters:
    joints:
      - Revolute_60
      
    command_interfaces:
      - position
    state_interfaces:
      - position

    open_loop_control: true
    allow_integration_in_goal_trajectories: true