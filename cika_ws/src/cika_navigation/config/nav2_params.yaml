# ─────────────────────────────────────────────────────────────────────────────
# cika Nav2 Parameters
# Robot: 4WD skid-steer, ~25kg, arm stowed during navigation
# Footprint: ~0.6m x 0.4m (base + wheel overhang)
# Max autonomous speed: 0.3 m/s linear, 0.5 rad/s angular
# ─────────────────────────────────────────────────────────────────────────────

# amcl:
#   ros__parameters:
#     use_sim_time: true

#     # ── Particle filter ──────────────────────────────────────────────────────
#     min_particles: 500
#     max_particles: 2000
#     alpha1: 0.2          # Rotation noise from rotation
#     alpha2: 0.2          # Rotation noise from translation
#     alpha3: 0.2          # Translation noise from translation
#     alpha4: 0.2          # Translation noise from rotation
#     alpha5: 0.1          # Strafe noise (skid-steer has lateral slip)

#     # ── Frames ───────────────────────────────────────────────────────────────
#     base_frame_id: base_link
#     odom_frame_id: odom
