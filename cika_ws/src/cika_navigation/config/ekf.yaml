ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true  # Keeps Cika's pose locked to the 2D plane (no flying)
    publish_tf: true

    map_frame: map              # Global frame
    odom_frame: odom            # Odometry frame
    base_link_frame: base_link  # Robot center
    world_frame: odom           # We fuse into the odom frame

    # 1. Wheel Odometry (from skid_steer_controller)
    # We trust velocity (vx, vy, v_yaw) rather than raw position to avoid jumping
    odom0: /skid_steer_controller/odom
    odom0_config: [false, false, false, # x, y, z
                   false, false, false, # roll, pitch, yaw
                   true,  true,  false, # vx, vy, vz (Velocity)
                   false, false, true,  # v_roll, v_pitch, v_yaw
                   false, false, false]
    odom0_relative: true

    # 2. IMU (BNO055 Simulation)
    # We trust the Orientation (Yaw) and Angular Velocity
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,   # Yaw (Orientation)
                  false, false, false,
                  false, false, true,   # Yaw velocity (Angular)
                  true,  false, false]  # Acceleration X (linear)
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    # 3. Visual Odometry (from RTAB-Map)
    # We trust the absolute pose (x, y, yaw)
    odom1: /vo
    odom1_config: [true,  true,  false, # x, y
                   false, false, true,  # yaw
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_relative: false
