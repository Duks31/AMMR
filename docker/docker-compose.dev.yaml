services:

   # ── Manipulation: MoveIt2 + Arm ──────────────────────────────────
  amr_manipulation:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: amr_ros2:dev
    container_name: amr_manipulation_dev
    network_mode: host
    stdin_open: true
    tty: true           
    privileged: true
    volumes:
      - ../amr_ws/src:/amr_ws/src
      - ../amr_ws/config:/amr_ws/config
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0     # ESP32 (after usbipd attach)
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=$DISPLAY
      - WAYLAND_DISPLAY=$WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR
    deploy:                               # ← add
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    tmpfs:
      - /tmp:size=200m
    command: bash

