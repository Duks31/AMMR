services:

  # ── Navigation: SLAM + Nav2 ──────────────────────────────────────
  amr_navigation:
    build:
      context: ..                        # AMMR/ root
      dockerfile: docker/Dockerfile
    image: amr_ros2:humble
    container_name: amr_navigation
    network_mode: host
    privileged: true
    volumes:
      - ../amr_ws/src:/amr_ws/src        # live code editing
      - ../amr_ws/config:/amr_ws/config  # config files
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DISPLAY=$DISPLAY                 # for RViz2
    tmpfs:
      - /tmp:size=200m                   # protect SD card
    command: ros2 launch amr_bringup navigation.launch.py
    restart: unless-stopped

  # ── Perception: OAK-D + YOLO + Classifier ───────────────────────
  amr_perception:
    image: amr_ros2:humble
    container_name: amr_perception
    network_mode: host
    privileged: true
    volumes:
      - ../amr_ws/src:/amr_ws/src
      - ../amr_ws/models:/amr_ws/models  # YOLO + classifier models
    devices:
      - /dev/bus/usb:/dev/bus/usb        # OAK-D Lite (after usbipd attach)
    environment:
      - ROS_DOMAIN_ID=0
    tmpfs:
      - /tmp:size=200m
    command: ros2 launch amr_perception perception.launch.py
    restart: unless-stopped

  # ── Manipulation: MoveIt2 + Arm ──────────────────────────────────
  amr_manipulation:
    image: amr_ros2:humble
    container_name: amr_manipulation
    network_mode: host
    privileged: true
    volumes:
      - ../amr_ws/src:/amr_ws/src
      - ../amr_ws/config:/amr_ws/config
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0        # ESP32 serial
    environment:
      - ROS_DOMAIN_ID=0
    tmpfs:
      - /tmp:size=200m
    command: ros2 launch robot_arm_controller main_launch.py
    restart: unless-stopped