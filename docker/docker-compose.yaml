### docker-compose.yaml — cika robot hardware deployment (RPi 4B)
### Run order: micro-ROS agent (host) → then docker compose up
### For SLAM: docker compose run --rm cika_navigation ros2 launch cika_navigation cika_slam.launch.py use_sim_time:=false
### micro-ros-agent serial --dev /dev/ttyUSB0 -b 115200

services:
  # ── Navigation: RTAB-Map localization + EKF + Nav2 ───────────────
  cika_navigation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cika_ros2:humble
    container_name: cika_navigation
    network_mode: host
    privileged: true
    volumes:
      - ../cika_ws/src:/cika_ws/src
      - ../cika_ws/maps:/root/.ros
    devices:
      - /dev/ttyUSB1:/dev/ttyUSB1 # RPLIDAR C1 — change to ttyUSB0 if needed
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    tmpfs:
      - /tmp:size=200m
    command: ros2 launch cika_navigation cika_nav.launch.py use_sim_time:=false
    restart: unless-stopped

  # ── Perception: OAK-D Lite + YOLO + EfficientNet ─────────────────
  cika_perception:
    image: cika_ros2:humble
    container_name: cika_perception
    network_mode: host
    privileged: true
    depends_on:
      - cika_navigation
    volumes:
      - ../cika_ws/src:/cika_ws/src
      - /dev:/dev
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb # OAK-D Lite
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    tmpfs:
      - /tmp:size=200m
    command: ros2 launch cika_perception cika_perception.launch.py backend:=hardware use_sim_time:=false
    restart: unless-stopped

  # ── Task Manager: State Machine ───────────────────────────────────
  cika_task_manager:
    image: cika_ros2:humble
    container_name: cika_task_manager
    network_mode: host
    depends_on:
      - cika_navigation
      - cika_perception
    volumes:
      - ../cika_ws/src:/cika_ws/src
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    tmpfs:
      - /tmp:size=200m
    command: ros2 launch cika_task_manager cika_task_manager.launch.py use_sim_time:=false
    restart: unless-stopped

  # ── Manipulation: MoveIt2 + Arm ───────────────────────────────────
  # Requires micro-ROS agent on host for ESP32 arm controller
  # Uncomment when ready to test arm
  # cika_manipulation:
  #   image: cika_ros2:humble
  #   container_name: cika_manipulation
  #   network_mode: host
  #   privileged: true
  #   depends_on:
  #     - cika_navigation
      # volumes:
      # - ../cika_ws/src:/cika_ws/src
  #   devices:
  #     - /dev/ttyUSB0:/dev/ttyUSB0    # ESP32 arm controller
  #   environment:
  #     - ROS_DOMAIN_ID=0
  #     - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
  #   tmpfs:
  #     - /tmp:size=200m
  #   command: ros2 launch cika_manipulator moveit.launch.py use_sim_time:=false
  #   restart: unless-stopped

  # ── Foxglove Bridge: Remote Monitoring ────────────────────────────
  # Connect from laptop: https://app.foxglove.dev → ws://<pi-ip>:8765
  foxglove_bridge:
    image: cika_ros2:humble
    container_name: foxglove_bridge
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    command: ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765
    restart: unless-stopped
